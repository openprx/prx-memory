# cargo-deny configuration — OpenPRX standard v2

[graph]
all-features = true
exclude-dev = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
unmaintained = "all"
unsound = "workspace"
# Review all ignores by: 2026-06-01
ignore = [
    # Unmaintained — widely used, no replacement available
    { id = "RUSTSEC-2024-0436", reason = "paste: transitive dep (lance/tantivy), no alternative" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
include-dev = false
include-build = true
unused-allowed-license = "allow"

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true
allow-workspace = true
highlight = "all"

deny = [
    { crate = "openssl", reason = "Use rustls-tls instead", use-instead = "rustls" },
    { crate = "openssl-sys", reason = "Use rustls-tls instead" },
]

[[bans.features]]
crate = "reqwest"
deny = ["native-tls", "native-tls-vendored"]

[bans.workspace-dependencies]
duplicates = "warn"
unused = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = [
    "https://github.com/rust-lang/crates.io-index",
]
allow-git = []
